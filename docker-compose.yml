# Works without .env — defaults in this file + .env.default.
# Optional overrides: create .env or docker compose --env-file .env up

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.default
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mikov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mikov}
      POSTGRES_DB: ${POSTGRES_DB:-mikov}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikov}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env.default
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file:
      - .env.default
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mikov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mikov}
      POSTGRES_DB: ${POSTGRES_DB:-mikov}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_PUBLIC_BASE_PATH: ${S3_PUBLIC_BASE_PATH:-/storage}
      S3_PRESIGN_EXPIRES_SECONDS: ${S3_PRESIGN_EXPIRES_SECONDS:-3600}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-models}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-mikov-cottages/1.0 (docker)}
      NOMINATIM_COUNTRY_CODES: ${NOMINATIM_COUNTRY_CODES:-ru}
      NOMINATIM_VIEWBOX: ${NOMINATIM_VIEWBOX:-57.85,56.65,58.25,55.75}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_STORAGE_PROXY_TARGET: http://minio:9000
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
